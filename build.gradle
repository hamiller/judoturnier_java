plugins {
	id 'java'
	id 'war'
	id 'org.springframework.boot' version '4.1.0'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.github.ben-manes.versions' version '0.54.0'
}

group = 'de.sinnix'

def commitCount = 'git rev-list --count HEAD'.execute().text.trim()
version = "0.2.${commitCount}-SNAPSHOT"

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

configurations {
	all {
		exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
	}
	developmentOnly
	runtimeClasspath {
		extendsFrom developmentOnly
	}
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	implementation 'org.springframework:spring-web'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-log4j2'
	implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.boot:spring-boot-starter-websocket'
	implementation 'org.springframework.boot:spring-boot-devtools'
	implementation 'org.apache.commons:commons-lang3:3.20.0'
	implementation 'org.apache.logging.log4j:log4j-api:2.26.1'
	implementation 'org.apache.logging.log4j:log4j-core:2.26.1'
	implementation 'org.springframework.boot:spring-boot-starter-flyway'
	implementation 'org.flywaydb:flyway-database-postgresql'
	implementation 'com.github.jknack:handlebars:4.5.3'
	implementation 'com.github.jknack:handlebars-springmvc:4.5.3'
	implementation 'com.google.zxing:core:3.5.4'
	implementation 'com.opencsv:opencsv:5.12.0', {
		exclude group: 'commons-logging', module: 'commons-logging'
	}
	runtimeOnly 'org.postgresql:postgresql:42.7.13'
	compileOnly 'org.projectlombok:lombok:1.18.46'
	annotationProcessor 'org.projectlombok:lombok:1.18.46'
	providedRuntime 'org.springframework.boot:spring-boot-starter-tomcat-runtime'
	testImplementation 'com.h2database:h2:2.4.240'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.mockito:mockito-core:5.23.0'
	testImplementation 'org.mockito:mockito-junit-jupiter:5.23.0'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

	developmentOnly 'org.springframework.boot:spring-boot-devtools'

	testImplementation platform('org.testcontainers:testcontainers-bom:1.21.3')
	testImplementation 'org.springframework.boot:spring-boot-webclient'
	testImplementation 'org.testcontainers:testcontainers'
    testImplementation 'org.testcontainers:postgresql'
    testImplementation 'org.testcontainers:junit-jupiter'
	testImplementation 'org.htmlunit:htmlunit:4.16.0'
    testImplementation 'com.github.dasniko:testcontainers-keycloak:3.8.0'
    testImplementation 'com.microsoft.playwright:playwright:1.55.0'
}

tasks.named('test') {
	useJUnitPlatform()
	jvmArgs("-XX:+EnableDynamicAgentLoading", "-Xshare:off")

	testLogging {
		events "started", "passed", "skipped", "failed"
		exceptionFormat "full"
		showCauses true
		showExceptions true
		showStackTraces true
	}

	afterSuite { desc, result ->
		if (!desc.parent) {
			println "\nTest result: ${result.resultType} (${result.testCount} tests, ${result.successfulTestCount} passed, ${result.failedTestCount} failed, ${result.skippedTestCount} skipped)"
		}
	}
}

tasks.register('playwrightInstallFirefox', JavaExec) {
	group = 'verification'
	description = 'Installs the Playwright Firefox browser used by integration tests.'
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'com.microsoft.playwright.CLI'
	args 'install', 'firefox'
}

springBoot {
	buildInfo()
}

//// immer gleichen Namen verwenden, sodass der Copy-Befehl im Dockerfile funktioniert
bootJar {
	archiveFileName = 'judoturnier.jar'
}
